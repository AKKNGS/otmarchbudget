<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>របាយការណ៍ថវិកា - ហម ម៉ាលីនដា</title>

  <link href="https://fonts.googleapis.com/css2?family=Khmer+OS+Siemreap&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f46e5" />
  <link rel="apple-touch-icon" href="logo.png" />
</head>

<body>
  <div class="app-shell">

    <!-- TOP APP BAR -->
    <header class="app-topbar">
      <div class="brand">
        <img src="logo.png" class="brand-logo" alt="Logo">
        <div class="brand-text">
          <div class="brand-title">របាយការណ៍ថវិកាបំប៉ន</div>
          <div class="brand-sub">ខែមីនា ឆ្នាំសិក្សា២០២៥-២០២៦</div>
        </div>
      </div>

      <button class="icon-btn" id="btn-refresh" title="Refresh">
        <i class="fa-solid fa-rotate-right"></i>
      </button>
    </header>

    <!-- HOME PAGE -->
    <main id="home-page" class="page active" aria-label="ទិន្នន័យ">

      <!-- STATS GRID -->
      <section class="stats-grid" aria-label="ស្ថិតិខាងលើ">
        <div class="stat-card">
          <div class="stat-mini-icon"><i class="fas fa-chalkboard-teacher"></i></div>
          <div class="stat-mini-body">
            <div class="stat-mini-value" id="total-teachers">...</div>
            <div class="stat-mini-label">គ្រូសរុប</div>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-mini-icon"><i class="fas fa-user"></i></div>
          <div class="stat-mini-body">
            <div class="stat-mini-value" id="female-teachers">...</div>
            <div class="stat-mini-label">គ្រូស្រី</div>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-mini-icon"><i class="fas fa-user-graduate"></i></div>
          <div class="stat-mini-body">
            <div class="stat-mini-value" id="total-students">...</div>
            <div class="stat-mini-label">សិស្សសរុប</div>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-mini-icon"><i class="fas fa-user"></i></div>
          <div class="stat-mini-body">
            <div class="stat-mini-value" id="female-students">...</div>
            <div class="stat-mini-label">សិស្សស្រី</div>
          </div>
        </div>

        <div class="stat-card stat-wide">
          <div class="stat-mini-icon"><i class="fas fa-money-bill-trend-up"></i></div>
          <div class="stat-mini-body">
            <div class="stat-mini-value" id="total-budget">...</div>
            <div class="stat-mini-label">ថវិកាសរុប</div>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-mini-icon"><i class="fas fa-circle-check"></i></div>
          <div class="stat-mini-body">
            <div class="stat-mini-value" id="total-80">...</div>
            <div class="stat-mini-label">ថវិកា 80%</div>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-mini-icon"><i class="fas fa-building-columns"></i></div>
          <div class="stat-mini-body">
            <div class="stat-mini-value" id="total-20">...</div>
            <div class="stat-mini-label">ថវិកា 20%</div>
          </div>
        </div>
      </section>

      <!-- Data Card -->
      <section class="card">
        <div class="card-head">
          <div class="tabs" role="tablist" aria-label="ទិន្នន័យ">
            <button class="tab active" id="tab-teachers" data-type="teachers" role="tab" aria-selected="true">
              <i class="fas fa-chalkboard-teacher"></i>
              <span>គ្រូ</span>
            </button>
            <button class="tab" id="tab-students" data-type="students" role="tab" aria-selected="false">
              <i class="fas fa-user-graduate"></i>
              <span>សិស្ស</span>
            </button>
          </div>
        </div>

        <div class="search">
          <i class="fas fa-magnifying-glass"></i>
          <input id="search-input" type="text" placeholder="ស្វែងរកឈ្មោះ..." inputmode="search" />
          <button class="clear-btn" id="btn-clear" title="Clear">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <div id="data-list" class="list">
          <div class="loading">
            <div class="spinner"></div>
            <div>កំពុងទាញទិន្នន័យ...</div>
          </div>
        </div>
      </section>
    </main>

    <!-- PROFILE PAGE -->
    <main id="profile-page" class="page" aria-label="គណនី">
      <section class="profile-hero">
        <div class="profile-card">
          <div class="avatar">
            <i class="fas fa-user-tie"></i>
          </div>
          <div class="profile-meta">
            <div class="profile-name">ហម ម៉ាលីនដា</div>
            <div class="profile-badge">
              <i class="fa-solid fa-wand-magic-sparkles"></i>
              អ្នកបង្កើតកម្មវិធី
            </div>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="info-tile">
          <div class="tile-icon"><i class="fas fa-id-card"></i></div>
          <div class="tile-body">
            <div class="tile-label">ឈ្មោះអ្នកបង្កើត</div>
            <div class="tile-value">ហម ម៉ាលីនដា</div>
          </div>
        </div>

        <a class="info-tile link" href="tel:017751115">
          <div class="tile-icon"><i class="fas fa-phone-alt"></i></div>
          <div class="tile-body">
            <div class="tile-label">លេខទូរសព្ទ</div>
            <div class="tile-value">017 751 115</div>
          </div>
          <div class="tile-arrow"><i class="fas fa-chevron-right"></i></div>
        </a>

        <a class="info-tile link" href="https://t.me/MalindaHorm" target="_blank" rel="noopener">
          <div class="tile-icon"><i class="fab fa-telegram-plane"></i></div>
          <div class="tile-body">
            <div class="tile-label">Telegram</div>
            <div class="tile-value">t.me/MalindaHorm</div>
          </div>
          <div class="tile-arrow"><i class="fas fa-chevron-right"></i></div>
        </a>
      </section>
    </main>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav" role="navigation" aria-label="Main">
      <button class="nav-btn active" id="nav-data" data-page="home" aria-current="page">
        <i class="fas fa-chart-pie"></i>
        <span>ទិន្នន័យ</span>
      </button>

      <button class="nav-btn" id="nav-profile" data-page="profile">
        <i class="fas fa-user-circle"></i>
        <span>គណនី</span>
      </button>
    </nav>

    <div class="toast" id="toast" aria-live="polite"></div>
  </div>

  <!-- ✅ DETAIL MODAL (Bottom Sheet) -->
  <div class="modal" id="detail-modal" aria-hidden="true">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-sheet" id="modal-sheet" role="dialog" aria-modal="true">
      <div class="sheet-handle"></div>

      <div class="sheet-header">
        <div class="sheet-title" id="detail-title">ព័ត៌មានលម្អិត</div>
        <button class="sheet-close" id="btn-close-modal" title="Close">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <div class="sheet-sub" id="detail-sub">—</div>

      <div class="sheet-content" id="detail-content">
        <!-- injected -->
      </div>
    </div>
  </div>

  <script src="script.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(() => console.log('Service Worker ដំណើរការជោគជ័យ!'))
          .catch(err => console.log('Service Worker បរាជ័យ:', err));
      });
    }
  </script>
</body>
</html>
